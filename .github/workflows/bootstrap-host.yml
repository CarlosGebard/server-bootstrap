name: Bootstrap Host

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Git ref to deploy
        required: true
        default: main

concurrency:
  group: production-bootstrap
  cancel-in-progress: false

jobs:
  bootstrap:
    name: Bootstrap production host from Infisical secrets
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.git_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pull bootstrap secrets from Infisical via OIDC
        uses: Infisical/secrets-action@v1.0.10
        with:
          method: "oidc"
          identity-id: "${{ vars.INFISICAL_IDENTITY_ID }}"
          project-slug: "${{ vars.INFISICAL_PROJECT_SLUG }}"
          env-slug: "${{ vars.INFISICAL_ENV_SLUG }}"
          secret-path: "${{ vars.INFISICAL_SECRET_PATH }}"

      - name: Install Ansible
        run: python -m pip install --upgrade pip ansible-core

      - name: Validate bootstrap playbook syntax
        run: tests/ansible/syntax-check.sh

      - name: Assert required bootstrap secrets are present
        env:
          PROD_HOST: ${{ env.PROD_HOST }}
          PROD_SSH_PRIVATE_KEY: ${{ env.PROD_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          [[ -n "${PROD_HOST}" ]] || { echo "Missing PROD_HOST"; exit 1; }
          [[ -n "${PROD_SSH_PRIVATE_KEY}" ]] || { echo "Missing PROD_SSH_PRIVATE_KEY"; exit 1; }

      - name: Prepare SSH material
        env:
          PROD_HOST: ${{ env.PROD_HOST }}
          PROD_SSH_KNOWN_HOSTS: ${{ env.PROD_SSH_KNOWN_HOSTS }}
          PROD_SSH_PORT: ${{ env.PROD_SSH_PORT }}
          PROD_SSH_PRIVATE_KEY: ${{ env.PROD_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"

          printf '%s\n' "$PROD_SSH_PRIVATE_KEY" > "$HOME/.ssh/bootstrap_key"
          chmod 600 "$HOME/.ssh/bootstrap_key"

          if [[ -n "${PROD_SSH_KNOWN_HOSTS:-}" ]]; then
            printf '%s\n' "$PROD_SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          else
            ssh-keyscan -p "${PROD_SSH_PORT:-22}" -H "$PROD_HOST" >> "$HOME/.ssh/known_hosts"
          fi

          chmod 644 "$HOME/.ssh/known_hosts"

      - name: Build temporary inventory
        env:
          PROD_HOST: ${{ env.PROD_HOST }}
          PROD_SSH_PORT: ${{ env.PROD_SSH_PORT }}
          PROD_SSH_USER: ${{ env.PROD_SSH_USER }}
        run: |
          set -euo pipefail

          printf '%s\n' \
            'all:' \
            '  hosts:' \
            '    bootstrap_target:' \
            "      ansible_host: ${PROD_HOST}" \
            "      ansible_user: ${PROD_SSH_USER:-root}" \
            "      ansible_port: ${PROD_SSH_PORT:-22}" \
            "      ansible_ssh_private_key_file: ${HOME}/.ssh/bootstrap_key" \
            > /tmp/bootstrap-hosts.yml

      - name: Run bootstrap playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "true"
        run: |
          set -euo pipefail

          cd ansible

          ansible-playbook \
            -i /tmp/bootstrap-hosts.yml \
            playbooks/bootstrap.yml
