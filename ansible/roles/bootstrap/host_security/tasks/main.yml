---
- name: Install host security packages
  ansible.builtin.apt:
    name: "{{ packages.security }}"
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Install fail2ban jail for SSH
  ansible.builtin.template:
    src: jail-sshd.local.j2
    dest: /etc/fail2ban/jail.d/sshd.local
    owner: root
    group: root
    mode: "0644"
  notify: Restart fail2ban

- name: Ensure fail2ban is enabled and running
  ansible.builtin.service:
    name: fail2ban
    state: started
    enabled: true

- name: Set UFW default incoming policy
  ansible.builtin.command: ufw default deny incoming
  register: bootstrap_ufw_default_incoming
  changed_when: "'Default incoming policy changed to' in bootstrap_ufw_default_incoming.stdout"

- name: Set UFW default outgoing policy
  ansible.builtin.command: ufw default allow outgoing
  register: bootstrap_ufw_default_outgoing
  changed_when: "'Default outgoing policy changed to' in bootstrap_ufw_default_outgoing.stdout"

- name: Allow required TCP ports through UFW
  ansible.builtin.command: "ufw allow {{ item }}/tcp"
  loop: "{{ firewall.allowed_tcp_ports }}"
  register: bootstrap_ufw_allow_rule
  changed_when: >-
    'Rule added' in bootstrap_ufw_allow_rule.stdout or
    'Rules updated' in bootstrap_ufw_allow_rule.stdout

- name: Check UFW status
  ansible.builtin.command: ufw status
  register: bootstrap_ufw_status
  changed_when: false

- name: Enable UFW
  ansible.builtin.command: ufw --force enable
  when: "'Status: active' not in bootstrap_ufw_status.stdout"
  register: bootstrap_ufw_enable
  changed_when: "'Firewall is active' in bootstrap_ufw_enable.stdout"
