---
- name: Gather service facts
  ansible.builtin.service_facts:

- name: Assert Docker service is running
  ansible.builtin.assert:
    that:
      - "'docker.service' in ansible_facts.services"
      - ansible_facts.services['docker.service'].state == 'running'
    fail_msg: Docker service is not running after host baseline apply.

- name: Assert Tailscale service is running when enabled
  ansible.builtin.assert:
    that:
      - "'tailscaled.service' in ansible_facts.services"
      - ansible_facts.services['tailscaled.service'].state == 'running'
    fail_msg: Tailscale service is not running after host baseline apply.
  when: tailscale.enabled

- name: Assert Alloy service is running
  ansible.builtin.assert:
    that:
      - "'alloy.service' in ansible_facts.services"
      - ansible_facts.services['alloy.service'].state == 'running'
    fail_msg: Alloy service is not running after host baseline apply.

- name: Check docker compose plugin availability
  ansible.builtin.command:
    cmd: docker compose version
  register: runtime_docker_compose_version
  changed_when: false

- name: Check Tailscale status
  ansible.builtin.command:
    cmd: tailscale status --json
  register: runtime_tailscale_status_raw
  changed_when: false
  when: tailscale.enabled

- name: Parse Tailscale status
  ansible.builtin.set_fact:
    runtime_tailscale_status: "{{ runtime_tailscale_status_raw.stdout | from_json }}"
  when:
    - tailscale.enabled
    - runtime_tailscale_status_raw.stdout | default('') | length > 0

- name: Assert Tailscale backend is running
  ansible.builtin.assert:
    that:
      - runtime_tailscale_status.BackendState == "Running"
    fail_msg: >-
      Tailscale is not fully connected. BackendState={{ runtime_tailscale_status.BackendState | default('unknown') }}.
  when: tailscale.enabled

- name: Check Alloy HTTP endpoint
  ansible.builtin.command:
    cmd: curl -fsS "http://127.0.0.1:{{ alloy.http_listen_addr.split(':')[-1] }}/-/ready"
  register: runtime_alloy_ready
  changed_when: false

- name: Assert base directory tree exists
  ansible.builtin.stat:
    path: "{{ item.path }}"
  loop: "{{ filesystem_base_dirs }}"
  register: runtime_directory_stats

- name: Assert base directories are present
  ansible.builtin.assert:
    that:
      - item.stat.exists
      - item.stat.isdir
    fail_msg: "Expected base directory is missing: {{ item.stat.path }}"
  loop: "{{ runtime_directory_stats.results }}"
