---
- name: Ensure Grafana APT keyring directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Download Grafana APT GPG key
  ansible.builtin.get_url:
    url: https://apt.grafana.com/gpg.key
    dest: /tmp/grafana.gpg.key
    owner: root
    group: root
    mode: "0644"

- name: Dearmor Grafana APT key
  ansible.builtin.command:
    cmd: gpg --dearmor --yes -o /etc/apt/keyrings/grafana.gpg /tmp/grafana.gpg.key
  args:
    creates: /etc/apt/keyrings/grafana.gpg

- name: Add Grafana APT repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ grafana_apt_arch_map[ansible_architecture] | default('amd64') }}
      signed-by=/etc/apt/keyrings/grafana.gpg]
      https://apt.grafana.com stable main
    filename: grafana
    state: present

- name: Install Grafana Alloy
  ansible.builtin.apt:
    name: alloy
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Ensure Alloy storage path exists
  ansible.builtin.file:
    path: "{{ alloy.storage_path }}"
    state: directory
    owner: alloy
    group: alloy
    mode: "0750"

- name: Install generic Alloy bootstrap config
  ansible.builtin.template:
    src: bootstrap-config.alloy.j2
    dest: /etc/alloy/config.alloy
    owner: root
    group: root
    mode: "0644"
  notify: Restart alloy

- name: Configure generic Alloy service flags
  ansible.builtin.template:
    src: bootstrap-default.alloy.j2
    dest: /etc/default/alloy
    owner: root
    group: root
    mode: "0644"
  notify: Restart alloy

- name: Enable and start Alloy service
  ansible.builtin.service:
    name: alloy
    state: started
    enabled: true
