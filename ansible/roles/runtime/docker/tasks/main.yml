---
- name: Ensure Docker APT keyring directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Download Docker official GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    owner: root
    group: root
    mode: "0644"

- name: Add Docker official APT repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ docker_apt_arch_map[ansible_architecture] | default('amd64') }}
      signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/ubuntu
      {{ host.ubuntu_release }} stable
    filename: docker
    state: present

- name: Install Docker CE stack
  ansible.builtin.apt:
    name:
      - containerd.io
      - docker-buildx-plugin
      - docker-ce
      - docker-ce-cli
      - docker-compose-plugin
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Ensure Docker service is enabled and running
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Ensure admin user is part of docker group
  ansible.builtin.user:
    name: "{{ host.admin_user }}"
    groups: docker
    append: true
