---
- name: Bootstrap host baseline
  hosts: all
  become: true
  gather_facts: true

  pre_tasks:
    - name: Load inventory group vars fragments
      ansible.builtin.include_vars:
        dir: "{{ playbook_dir }}/../inventories/production/group_vars"
        extensions:
          - yml

  roles:
    - role: bootstrap/packages
    - role: bootstrap/admin_access
    - role: bootstrap/ssh_hardening
    - role: bootstrap/host_security
    - role: bootstrap/swap
